name: Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/configure-pages@v5
      - run: pnpm install --frozen-lockfile
      # Custom domain doc-bridge.agentskit.io is root-hosted — no /doc-bridge base path.
      - run: pnpm docs:build
        env:
          NEXT_PUBLIC_SITE_URL: https://doc-bridge.agentskit.io
      - name: Verify product-domain links (no GitHub Pages subpath)
        run: |
          node -e "
            const fs = require('node:fs');
            const html = fs.readFileSync('apps/docs/out/docs/getting-started/index.html', 'utf8');
            if (html.includes('href=\"/doc-bridge/')) throw new Error('Pages still embeds /doc-bridge base path');
            if (!html.includes('href=\"/docs/spec/config-v1/\"') && !html.includes('href=\"/docs/spec/config-v1')) {
              // fumadocs may emit either form; require docs site-local links
              if (!html.includes('/docs/')) throw new Error('missing local docs links');
            }
          "
      - name: Ensure CNAME for custom domain
        run: |
          cp apps/docs/public/CNAME apps/docs/out/CNAME
          test -f apps/docs/out/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/out
      - id: deployment
        uses: actions/deploy-pages@v4
