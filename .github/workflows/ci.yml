name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 10.19.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:no-legacy-chat-imports
      - run: pnpm typecheck
      - run: pnpm check:ecosystem-upstream
      - run: pnpm check:marketplace
      - run: pnpm test:marketplace
      - run: pnpm test
      - run: pnpm coverage
      - run: pnpm build
      - run: pnpm check:readme-standard
      - run: pnpm test:readme-standard
      - run: npm pack --dry-run
      - name: Packaged smoke (2-min path + MCP)
        run: pnpm smoke:packaged
      - name: Dogfood gate (doc-bridge on itself)
        run: |
          node bin/ak-docs.js index
          node bin/ak-docs.js gate run
          node bin/ak-docs.js doctor --text
          node bin/ak-docs.js doctor --write-badge
          node bin/ak-docs.js doctor --badge
      - name: Resolve a published version for the pre-release Action smoke
        id: published-doc-bridge
        run: echo "version=$(npm view @agentskit/doc-bridge version)" >> "$GITHUB_OUTPUT"
      - name: Run the public composite Action contract
        uses: ./
        with:
          config-path: doc-bridge.config.json
          package-version: ${{ steps.published-doc-bridge.outputs.version }}
      - name: Ollama smoke (optional)
        continue-on-error: true
        run: pnpm smoke:ollama

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm docs:typecheck
      - run: pnpm docs:build
      - run: pnpm test:docs-artifacts
      - run: pnpm docs:lighthouse
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          include-hidden-files: true
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm docs:e2e
