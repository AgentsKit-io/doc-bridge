name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.19.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm check:ecosystem-upstream
      - run: pnpm test
      - run: pnpm coverage
      - run: pnpm build
      - run: pnpm check:readme-standard
      - run: pnpm test:readme-standard
      - run: npm pack --dry-run
      - name: Packaged smoke (2-min path + MCP)
        run: pnpm smoke:packaged
      - name: Dogfood gate (doc-bridge on itself)
        run: |
          node bin/ak-docs.js index
          node bin/ak-docs.js gate run
          node bin/ak-docs.js doctor --text
          node bin/ak-docs.js doctor --write-badge
          node bin/ak-docs.js doctor --badge
      - name: Ollama smoke (optional)
        continue-on-error: true
        run: pnpm smoke:ollama

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm docs:typecheck
      - run: pnpm docs:build
      - run: pnpm docs:lighthouse
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm docs:e2e
